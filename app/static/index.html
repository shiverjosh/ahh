<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Malware Checker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/static/favicon.png" />
  <link rel="shortcut icon" href="/static/favicon.ico" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main>
    <h1><img src="/static/favicon.png" alt="" class="logo" /> Malware Checker</h1>
    <p id="health">Checking scanner status...</p>

    <div class="controls">
      <input id="fileInput" type="file" />
      <button id="scanBtn" disabled>Start scan</button>
      <button id="clearBtn">Clear all saved records</button>
    </div>

    <p id="selectedFile">No file selected.</p>

    <section id="uploadPanel" class="hidden">
      <p id="progress">Uploading... keep this tab open until the scan is queued.</p>
      <div class="progressOuter">
        <div id="uploadBar" class="progressInner"></div>
      </div>
      <p id="uploadPercent">0%</p>
    </section>

    <section id="currentResult" class="hidden"></section>

    <h2>Previous scans</h2>
    <section id="history"></section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
